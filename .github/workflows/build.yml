name: .NET MAUI MacCatalyst Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build MacCatalyst App
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install MAUI Workload
        run: dotnet workload install maui

      - name: Restore Dependencies
        run: dotnet restore src/Football.MauiApp/Football.MauiApp.csproj -r maccatalyst-x64

      - name: Build MacCatalyst App
        run: dotnet build src/Football.MauiApp/Football.MauiApp.csproj -c Release -f net8.0-maccatalyst -r maccatalyst-x64 --no-restore

      - name: Zip MacCatalyst App
        run: |
          cd src/Football.MauiApp/bin/Release/net8.0-maccatalyst/maccatalyst-x64
          zip -r ../../../../../Football_Mac.zip Football.MauiApp.app

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Football-Mac-App
          path: Football_Mac.zip
